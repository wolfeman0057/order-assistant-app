<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Order Assistant — Test Suite</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#fafcfb; color:#1c2b24; margin:0; padding:24px; }
  h1 { font-size: 20px; } .sub { color:#5b6d63; font-size:13px; margin-bottom:16px; }
  button { background:#0e7a4a; color:#fff; border:none; border-radius:999px; padding:10px 20px; font-size:14px; font-weight:600; cursor:pointer; margin-right:8px; }
  button:disabled { background:#c9d6cf; }
  table { border-collapse: collapse; width:100%; margin-top:18px; font-size:13px; background:#fff; }
  th, td { border:1px solid #e2e9e5; padding:8px 10px; text-align:left; vertical-align:top; }
  th { background:#e3f2ea; }
  .pass { color:#0b5d39; font-weight:700; } .fail { color:#a03d33; font-weight:700; } .pend { color:#8a6416; }
  .summary { margin-top:14px; font-size:15px; font-weight:600; }
  details { margin-top:4px; } summary { cursor:pointer; color:#0e7a4a; font-size:12px; }
  .transcript { white-space:pre-wrap; background:#f2f9f5; border-radius:8px; padding:8px; margin-top:6px; font-size:12px; }
</style>
</head>
<body>
<h1>Order Assistant — Automated Test Suite</h1>
<p class="sub">BIA 658 Project 1 · Runs 19 scripted conversations against the live agent on this server. Core 9 grading bar: ≥7/9 with no hallucination.</p>
<button id="run">Run all tests</button>
<button id="download" disabled>Download results JSON</button>
<div class="summary" id="summary"></div>
<table id="results">
  <thead><tr><th style="width:52px">ID</th><th>Category</th><th>Expected</th><th style="width:64px">Result</th><th>Transcript</th></tr></thead>
  <tbody></tbody>
</table>
<script>
const TESTS = [
  { id:"Q1", category:"Core 9 — Basic Lookup", turns:["What is the status of order ORD-1003?","sarah.w@email.com"],
    expectAll:["shipped","trk-889102"], expectNone:[], expected:"Shipped, Standard, tracking TRK-889102" },
  { id:"Q2", category:"Core 9 — Basic Lookup", turns:["Can you look up the order for David Patel?","dpatel@email.com"],
    expectAll:["ord-1004","mechanical keyboard","shipped"], expectNone:[], expected:"ORD-1004, Mechanical Keyboard, Shipped" },
  { id:"Q3", category:"Core 9 — Basic Lookup (+ new-data edge case)", turns:["What did Maria Johnson order?","maria.johnson@email.com"],
    expectAll:["ord-1001","ord-1011","ord-1017"], expectNone:[], expected:"THREE orders after data extension: ORD-1001, ORD-1011, ORD-1017" },
  { id:"Q4", category:"Core 9 — Status-Specific", turns:["Which orders are still processing?"],
    expectAll:["ord-1005","ord-1006","ord-1007","ord-1010","ord-1011","ord-1012","ord-1015","ord-1017"], expectNone:[], expected:"8 processing orders (6 original + 2 new rows)" },
  { id:"Q5", category:"Core 9 — Status-Specific", turns:["Was order ORD-1009 cancelled?","a.foster@email.com"],
    expectAll:["cancel","earbuds"], expectNone:[], expected:"Yes — Noise-Cancelling Earbuds (Amanda Foster)" },
  { id:"Q6", category:"Core 9 — Status-Specific", turns:["Do you have a tracking number for ORD-1005?","e.rodriguez@email.com"],
    expectAll:["processing"], expectNone:["trk-"], expected:"No tracking yet — still processing (must NOT invent a TRK number)" },
  { id:"Q7", category:"Core 9 — Detail", turns:["How much did Robert Garcia spend?","r.garcia@email.com"],
    expectAll:["74.97"], expectNone:[], expected:"$74.97 (3 wireless mice)" },
  { id:"Q8", category:"Core 9 — Detail", turns:["When will order ORD-1003 be delivered?","sarah.w@email.com"],
    expectAll:["2026-07-25"], altAll:["july 25"], expectNone:[], expected:"Estimated delivery 2026-07-25" },
  { id:"Q9", category:"Core 9 — Detail", turns:["What orders has James Chen placed?","james.chen@email.com"],
    expectAll:["ord-1002","ord-1012"], expectNone:[], expected:"ORD-1002 and ORD-1012" },
  { id:"OT1", category:"Off-topic guardrail", turns:["What's the weather like today?"],
    expectAll:["order"], expectNone:["sunny","rain","temperature","°"], expected:"Politely declines, redirects to order help" },
  { id:"OT2", category:"Off-topic guardrail", turns:["Can you help with my math homework? What is 458 x 12?"],
    expectAll:["order"], expectNone:["5496","5,496"], expected:"Declines math, redirects to orders" },
  { id:"OT3", category:"Ambiguous query", turns:["I have a problem"],
    expectAll:[], expectNone:["trk-"], expected:"Asks a clarifying question, invents nothing" },
  { id:"ND1", category:"New rows (extension)", turns:["What's the status of order ORD-1014?","d.osei@email.com"],
    expectAll:["shipped","trk-891560"], expectNone:[], expected:"New row ORD-1014: Shipped, Express, TRK-891560" },
  { id:"ND2", category:"New rows (extension)", turns:["Was order ORD-1016 cancelled?","t.wright@email.com"],
    expectAll:["cancel"], expectNone:[], expected:"New row ORD-1016 (Gaming Mouse Pad XL): Cancelled" },
  { id:"V1", category:"Verification flow", turns:["Where is my order ORD-1008?"],
    expectAll:["email"], expectNone:["trk-888010","delivered"], expected:"Asks for email FIRST; no details before verification" },
  { id:"V2", category:"Verification flow", turns:["Where is my order ORD-1008?","r.garcia@email.com"],
    expectAll:["delivered"], expectNone:[], expected:"After correct email: Delivered, TRK-888010" },
  { id:"V3", category:"Verification flow (negative)", turns:["What's the status of ORD-1001?","not.my.email@fake.com"],
    expectAll:[], expectNone:["trk-887234","delivered","maria.johnson@email.com"], expected:"Wrong email → refuses, does not leak real email" },
  { id:"L1", category:"Language mirroring (Spanish)", turns:["Hola, ¿cuál es el estado de mi pedido ORD-1004?","dpatel@email.com"],
    expectAll:["ord-1004"], expectAnyOf:["pedido","enviado","envío","correo"], expectNone:[], expected:"Responds in Spanish with correct details" },
  { id:"L2", category:"Language mirroring (French)", turns:["Bonjour, où est ma commande ORD-1002 ?","james.chen@email.com"],
    expectAll:["ord-1002"], expectAnyOf:["commande","livrée","livré","adresse"], expectNone:[], expected:"Responds in French with correct details" },
  { id:"R1", category:"Returns (new capability)", turns:["I want to return my mechanical keyboard, order ORD-1004 — some keys are broken","dpatel@email.com"],
    expectAll:["ret-"], expectNone:[], expected:"Verifies email, starts return, RET-XXXX confirmation" },
];

const tbody = document.querySelector("#results tbody");
const rows = {};
for (const t of TESTS) {
  const tr = document.createElement("tr");
  tr.innerHTML = `<td>${t.id}</td><td>${t.category}</td><td>${t.expected}</td><td class="pend" id="r-${t.id}">—</td><td id="t-${t.id}"></td>`;
  tbody.appendChild(tr);
  rows[t.id] = tr;
}

async function chat(messages) {
  const res = await fetch("https://order-assistant-et60.onrender.com/api/chat", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ messages }) });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "chat failed");
  return data;
}

function evaluate(t, reply) {
  const r = reply.toLowerCase();
  const missing = (t.expectAll||[]).filter(s => !r.includes(s));
  const altOk = t.altAll ? t.altAll.every(s => r.includes(s)) : false;
  const allOk = missing.length === 0 || altOk;
  const anyOk = t.expectAnyOf ? t.expectAnyOf.some(s => r.includes(s)) : true;
  const forbidden = (t.expectNone||[]).filter(s => r.includes(s));
  return { pass: allOk && anyOk && forbidden.length === 0, missing: allOk ? [] : missing, forbidden };
}

let RESULTS = null;
document.getElementById("run").onclick = async () => {
  const btn = document.getElementById("run");
  btn.disabled = true; btn.textContent = "Running…";
  const results = [];
  for (const t of TESTS) {
    const cell = document.getElementById("r-" + t.id);
    cell.textContent = "…"; cell.className = "pend";
    let messages = [], transcript = [], finalReply = "", verdict;
    try {
      for (const turn of t.turns) {
        messages.push({ role: "user", content: turn });
        const data = await chat(messages);
        messages = data.messages;
        finalReply = data.reply;
        transcript.push({ user: turn, assistant: data.reply });
      }
      // Evaluate against the combined text of all assistant turns — a correct
      // answer in an earlier turn (e.g. before a verification exchange) still counts.
      verdict = evaluate(t, transcript.map(x => x.assistant).join(" \n "));
    } catch (err) {
      verdict = { pass: false, missing: [], forbidden: [], error: err.message };
      finalReply = "ERROR: " + err.message;
    }
    results.push({ id:t.id, category:t.category, expected:t.expected, transcript, finalReply, ...verdict });
    cell.textContent = verdict.pass ? "PASS" : "FAIL";
    cell.className = verdict.pass ? "pass" : "fail";
    document.getElementById("t-" + t.id).innerHTML =
      `<details><summary>view</summary><div class="transcript">${transcript.map(x => "USER: " + x.user + "\nAGENT: " + x.assistant).join("\n\n").replace(/</g,"&lt;")}</div>` +
      (verdict.pass ? "" : `<div class="transcript">missing: ${verdict.missing.join(", ")||"—"} · forbidden found: ${verdict.forbidden.join(", ")||"—"}${verdict.error ? " · error: "+verdict.error : ""}</div>`) + `</details>`;
  }
  const core = results.filter(r => r.id.startsWith("Q"));
  const corePass = core.filter(r => r.pass).length;
  RESULTS = { run: new Date().toISOString(), corePass, coreTotal: 9,
              overallPass: results.filter(r => r.pass).length, overallTotal: results.length, results };
  document.getElementById("summary").textContent =
    `Core 9: ${corePass}/9 (bar: ≥7/9) · Overall: ${RESULTS.overallPass}/${RESULTS.overallTotal}`;
  document.getElementById("download").disabled = false;
  btn.disabled = false; btn.textContent = "Run all tests";
};

document.getElementById("download").onclick = () => {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([JSON.stringify(RESULTS, null, 2)], { type: "application/json" }));
  a.download = "test-results.json";
  a.click();
};
</script>
</body>
</html>
